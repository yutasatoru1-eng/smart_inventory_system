{% extends "inventory/base.html" %}

{% block content %}
<h2>Order History</h2>

<table class="table table-striped">
    <thead>
    <tr>
        <th>ID</th><th>Customer</th><th>Date</th><th>Total</th>
    </tr>
    </thead>
    <tbody>
    {% for row in orders %}
        <tr>
            <td>{{ row.order.id }}</td>
            <td>{{ row.order.customer.name }}</td>
            <td>{{ row.order.order_date }}</td>
            <td>{{ row.total }}</td>
        </tr>
    {% empty %}
        <tr><td colspan="4">No orders yet.</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
